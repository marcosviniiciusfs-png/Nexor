name: Export leads to repository

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lead-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export pending leads
        env:
          LEAD_EXPORT_TOKEN: ${{ secrets.LEAD_EXPORT_TOKEN }}
          LEAD_EXPORT_URL: https://grupo-uniao-lead-webhook.marcosviniicius-fs.workers.dev/lead-export
        run: |
          python <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import sys
          import urllib.error
          import urllib.request

          export_url = os.environ["LEAD_EXPORT_URL"]
          export_token = os.environ["LEAD_EXPORT_TOKEN"].strip()
          headers = {
              "Authorization": f"Bearer {export_token}",
              "Accept": "application/json",
              "User-Agent": "grupo-uniao-lead-export-action",
          }

          request = urllib.request.Request(export_url, headers=headers, method="GET")
          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as error:
              print(f"Lead export request failed with HTTP {error.code}: {error.read().decode('utf-8', errors='replace')}")
              raise

          items = payload.get("items", [])
          if not items:
              print("No pending leads to export.")
              sys.exit(0)

          root = pathlib.Path("leads-cadastrados").resolve()
          keys = []

          for item in items:
              path = item.get("path", "")
              if not path.startswith("leads-cadastrados/"):
                  raise ValueError(f"Unexpected lead path: {path}")

              target = pathlib.Path(path)
              resolved = target.resolve()
              if root not in resolved.parents:
                  raise ValueError(f"Lead path escapes export directory: {path}")

              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(
                  json.dumps(item["content"], ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )
              keys.append(item["key"])

          subprocess.run(["git", "config", "user.name", "github-actions[bot]"], check=True)
          subprocess.run(
              ["git", "config", "user.email", "41898282+github-actions[bot]@users.noreply.github.com"],
              check=True,
          )
          subprocess.run(["git", "add", "leads-cadastrados"], check=True)

          has_changes = subprocess.run(["git", "diff", "--cached", "--quiet"]).returncode != 0
          if has_changes:
              subprocess.run(["git", "commit", "-m", "Export Grupo Uniao leads"], check=True)
              subprocess.run(["git", "push"], check=True)
          else:
              print("Pending leads were already present in the repository.")

          ack_body = json.dumps({"keys": keys}).encode("utf-8")
          ack_headers = {
              **headers,
              "Content-Type": "application/json",
          }
          ack_request = urllib.request.Request(export_url, data=ack_body, headers=ack_headers, method="POST")
          with urllib.request.urlopen(ack_request, timeout=30) as response:
              ack_payload = json.loads(response.read().decode("utf-8"))

          print(f"Exported {len(keys)} lead(s). Ack: {ack_payload}")
          PY
